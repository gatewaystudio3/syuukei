<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタジオ業務システム</title>
    <style>
        /* 全体のスタイル設定（ご提示の金種計算機を優先） */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 1000px; /* スタジオ集計が崩れないよう、最大幅を拡張 */
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            color: #444;
        }

        /* タブ機能用スタイル */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #ccc;
            border-bottom: none;
            background-color: #eef2f5;
            color: #666;
            border-radius: 6px 6px 0 0;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background-color: #fff;
            color: #0056b3;
            border-color: #ddd;
            border-bottom: 2px solid #fff;
            margin-bottom: -12px;
            padding-bottom: 11px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* スタジオ集計システム用のスタイル */
        .studio-area {
            max-width: 100%;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-action {
            padding: 10px 20px;
            font-size: 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: background 0.2s;
        }

        .btn-clear { background-color: #dc3545; }
        .btn-clear:hover { background-color: #bd2130; }
        .btn-copy { background-color: #28a745; margin-bottom: 20px; }
        .btn-copy:hover { background-color: #218838; }
        
        .excel-table-wrapper {
            overflow-x: auto;
            margin-bottom: 25px;
            border: 1px solid #ccc;
        }

        .excel-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
        }

        .excel-table th, .excel-table td {
            border: 1px solid #bbb;
            text-align: center;
            font-size: 14px;
            padding: 0;
        }

        .excel-table th {
            background-color: #eee;
            color: #333;
            padding: 8px 4px;
            font-weight: bold;
            border-bottom: 2px solid #bbb;
        }

        .excel-table td input {
            width: 100%;
            box-sizing: border-box;
            border: none;
            text-align: center;
            padding: 12px 2px;
            font-size: 16px;
            background-color: #fff;
            color: #000;
        }

        .excel-table td input:read-only {
            outline: none;
        }

        /* 金種計算機用のオリジナルスタイル */
        .target-setting-area {
            background-color: #eef2f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #dae1e7;
        }

        .target-label {
            font-weight: bold;
            margin-right: 10px;
            font-size: 16px;
        }

        #target-input {
            width: 120px;
            padding: 8px;
            font-size: 20px;
            font-weight: bold;
            text-align: right;
            border: 2px solid #ccc;
            border-radius: 4px;
            color: #0056b3;
        }

        .money-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .money-table th {
            background-color: #eee;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            border-bottom: 2px solid #ddd;
        }

        .money-table td {
            padding: 10px 5px;
            border-bottom: 1px solid #f0f0f0;
        }

        .label-col {
            font-weight: bold;
            text-align: right;
            width: 30%;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: right;
            box-sizing: border-box;
        }
        
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .subtotal-col {
            text-align: right;
            width: 35%;
            font-family: monospace;
            font-size: 16px;
        }

        .total-section {
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            transition: background-color 0.3s ease;
            color: white;
            font-weight: bold;
        }

        .total-label {
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        .total-amount {
            font-size: 32px;
        }

        .status-match {
            background-color: #28a745;
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.5);
        }

        .status-mismatch {
            background-color: #dc3545;
            box-shadow: 0 0 10px rgba(220, 53, 69, 0.5);
        }

        .money-wrapper {
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('studio-tab', this)">スタジオ件数集計</button>
        <button class="tab-btn" onclick="switchTab('money-tab', this)">金種計算機</button>
    </div>

    <div id="studio-tab" class="tab-content active">
        <div class="studio-area">
            <div class="input-area">
                <input type="text" id="inputString" placeholder="ここに文字列を入力してください (例: bgpws1230cd)" oninput="aggregate()">
                <button class="btn-action btn-clear" onclick="clearInput()">クリア</button>
            </div>

            <button class="btn-action btn-copy" onclick="copyToClipboard()">エクセル用にコピー</button>

            <div class="excel-table-wrapper">
                <table class="excel-table">
                    <thead>
                        <tr>
                            <th>バンド</th>
                            <th>個人1</th>
                            <th>個人2</th>
                            <th>パック</th>
                            <th>学割</th>
                            <th>スタッフ割</th>
                            <th>紹介割</th>
                            <th>ポイント件数</th>
                            <th>ポイント数</th>
                            <th>備考</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="text" id="cell-band" readonly></td>
                            <td><input type="text" id="cell-kojin1" readonly></td>
                            <td><input type="text" id="cell-kojin2" readonly></td>
                            <td><input type="text" id="cell-pack" readonly></td>
                            <td><input type="text" id="cell-gakuwari" readonly></td>
                            <td><input type="text" id="cell-staff" readonly></td>
                            <td><input type="text" id="cell-shokai" readonly></td>
                            <td><input type="text" id="cell-pt-count" readonly></td>
                            <td><input type="text" id="cell-pt-amount" readonly></td>
                            <td><input type="text" id="cell-bikou" readonly></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="money-tab" class="tab-content">
        <div class="money-wrapper">
            <div class="target-setting-area">
                <label class="target-label" for="target-input">目標金額:</label>
                <input type="number" id="target-input" value="150000"> 円
            </div>
            
            <table class="money-table">
                <thead>
                    <tr>
                        <th>金種</th>
                        <th>枚数</th>
                        <th>金額</th>
                    </tr>
                </thead>
                <tbody id="currency-table">
                    </tbody>
            </table>

            <div id="total-display" class="total-section status-mismatch">
                <span class="total-label">合計金額</span>
                <span id="grand-total" class="total-amount">0</span> 円
            </div>
        </div>
    </div>
</div>

<script>
    /* ==========================================
       共通ロジック：タブ切り替え
       ========================================== */
    function switchTab(tabId, button) {
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        button.classList.add('active');
    }

    /* ==========================================
       機能1：スタジオ集計システム のスクリプト
       ========================================== */
    // カウント対象のすべての文字キー
    const allChars = ['b', '1', '2', 'p', 'g', 'w', 's', '3', '0', 'd', 'c'];

    function aggregate() {
        const inputStr = document.getElementById('inputString').value;
        
        // カウントの初期化
        let counts = {};
        allChars.forEach(char => counts[char] = 0);

        // 文字列を一文字ずつ解析
        for (let i = 0; i < inputStr.length; i++) {
            let char = inputStr[i];
            if (counts.hasOwnProperty(char)) {
                counts[char]++;
            }
        }

        // 1. 通常項目の反映（0件の場合は空欄ではなく画像に合わせ「0」を表示）
        document.getElementById('cell-band').value = counts['b'];
        document.getElementById('cell-kojin1').value = counts['1'];
        document.getElementById('cell-kojin2').value = counts['2'];
        document.getElementById('cell-pack').value = counts['p'];
        document.getElementById('cell-gakuwari').value = counts['g'];
        document.getElementById('cell-staff').value = counts['w'];
        document.getElementById('cell-shokai').value = counts['s'];

        // 2. ポイントの集計と反映
        const ptCount = counts['3'] + counts['0'];
        const ptAmount = (counts['3'] * 30) + (counts['0'] * 100);
        document.getElementById('cell-pt-count').value = ptCount;
        document.getElementById('cell-pt-amount').value = ptAmount;

        // 3. 備考欄（ダンス・キャンセル）の統合反映
        document.getElementById('cell-bikou').value = `ダ${counts['d']}、C${counts['c']}`;
    }

    function clearInput() {
        document.getElementById('inputString').value = '';
        aggregate();
        document.getElementById('inputString').focus();
    }

    function copyToClipboard() {
        // 画像と同じ順番でセルの値を集める（計10列）
        const cellIds = [
            'cell-band', 'cell-kojin1', 'cell-kojin2', 'cell-pack', 'cell-gakuwari', 
            'cell-staff', 'cell-shokai', 'cell-pt-count', 'cell-pt-amount', 'cell-bikou'
        ];
        
        const rowData = cellIds.map(id => document.getElementById(id).value);
        const textToCopy = rowData.join('\t'); // タブ区切り（エクセルの横並び貼付用）

        navigator.clipboard.writeText(textToCopy).then(() => {
            alert('エクセル用のデータをクリップボードにコピーしました！\nエクセル上で貼り付け（Ctrl+V）してください。');
        }).catch(err => {
            alert('コピーに失敗しました。', err);
        });
    }

    /* ==========================================
       機能2：金種計算機 のスクリプト
       ========================================== */
    const denominations = [10000, 5000, 2000, 1000, 500, 100, 50, 10, 5, 1];
    const tableBody = document.getElementById('currency-table');
    const grandTotalEl = document.getElementById('grand-total');
    const totalDisplayBox = document.getElementById('total-display');
    const targetInput = document.getElementById('target-input');

    denominations.forEach(val => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="label-col">${val.toLocaleString()}円</td>
            <td>
                <input type="number" min="0" data-value="${val}" class="count-input" placeholder="0">
            </td>
            <td class="subtotal-col">
                <span id="subtotal-${val}">0</span>
            </td>
        `;
        tableBody.appendChild(tr);
    });

    const countInputs = document.querySelectorAll('.count-input');

    function calculateAndValidate() {
        let currentTotal = 0;

        countInputs.forEach(input => {
            const count = parseInt(input.value) || 0;
            const value = parseInt(input.getAttribute('data-value'));
            const subtotal = count * value;

            document.getElementById(`subtotal-${value}`).textContent = subtotal.toLocaleString();
            currentTotal += subtotal;
        });

        grandTotalEl.textContent = currentTotal.toLocaleString();
        const targetAmount = parseInt(targetInput.value) || 0;

        if (currentTotal === targetAmount) {
            totalDisplayBox.classList.remove('status-mismatch');
            totalDisplayBox.classList.add('status-match');
        } else {
            totalDisplayBox.classList.remove('status-match');
            totalDisplayBox.classList.add('status-mismatch');
        }
    }

    countInputs.forEach(input => {
        input.addEventListener('input', calculateAndValidate);
        input.addEventListener('focus', function() { this.select(); });
    });

    targetInput.addEventListener('input', calculateAndValidate);
    targetInput.addEventListener('focus', function() { this.select(); });

    // 初期起動時の処理
    aggregate();
    calculateAndValidate();
</script>

</body>
</html>
